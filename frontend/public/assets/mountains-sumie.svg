<svg xmlns="http://www.w3.org/2000/svg" width="520" height="360" viewBox="0 0 520 360" fill="none">
  <defs>
    <filter id="brushEdge" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.03" numOctaves="3" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softWash" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- distant, softest wash -->
  <path
    d="M-20 300 C 40 250, 90 268, 130 235 C 175 200, 210 245, 260 220 C 310 195, 350 250, 410 225 C 450 208, 480 240, 540 220 L 540 360 L -20 360 Z"
    fill="#4A5548" opacity="0.10" filter="url(#softWash)"/>

  <!-- mid ground, single asymmetric brushed peak -->
  <path
    d="M-20 330 C 20 300, 55 250, 95 205 C 115 182, 128 178, 142 200 C 160 228, 175 270, 210 295 C 250 322, 300 312, 340 330 L 340 360 L -20 360 Z"
    fill="#3E4A3E" opacity="0.16" filter="url(#brushEdge)"/>

  <!-- foreground brush stroke accent, single sweeping line -->
  <path
    d="M60 260 C 85 215, 105 190, 128 205 C 148 218, 155 245, 175 258"
    stroke="#33402F" stroke-width="3" stroke-linecap="round" fill="none"
    opacity="0.14" filter="url(#brushEdge)"/>

  <!-- ink dry-brush texture strokes -->
  <path d="M150 250 C 165 244, 180 246, 190 256" stroke="#33402F" stroke-width="1.4" opacity="0.10" fill="none" filter="url(#brushEdge)"/>
  <path d="M100 275 C 118 268, 138 270, 150 280" stroke="#33402F" stroke-width="1.2" opacity="0.08" fill="none" filter="url(#brushEdge)"/>
</svg>
